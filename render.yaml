services:
  - type: web
    name: big-ball-world-cup-2026
    runtime: python
    buildCommand: pip install uv && uv sync
    startCommand: uv run gunicorn main:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SUPABASE_DB_URL
        sync: false
      - key: UR_TOKEN
        sync: false
