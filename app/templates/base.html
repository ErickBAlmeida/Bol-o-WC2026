<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bolão Copa 2026{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Franklin:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="/">⚽ Bolão Copa 2026</a>
      <nav class="site-nav">
        <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Jogos</a>
        <a href="/leaderboard" class="nav-link {% if request.path == '/leaderboard' %}active{% endif %}">Ranking</a>
        {% if session.nickname %}
        <span class="nickname-chip">{{ session.nickname }}</span>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="site-main">
    {% with msg = session.pop('sync_msg', None) %}
    {% if msg %}
    <div class="flash">{{ msg }}</div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
