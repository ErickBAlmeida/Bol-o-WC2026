{% extends "base.html" %}
{% block title %}Entrar — Bolão Copa 2026{% endblock %}

{% block content %}
<div class="center-card">
  <h1 class="card-title">Qual é o seu apelido?</h1>
  <p class="card-sub">Crie um PIN de 4 dígitos no primeiro acesso. Nas próximas vezes use o mesmo PIN.</p>

  <form method="POST" action="/nickname" class="nickname-form">
    <input
      type="text"
      name="nickname"
      class="nickname-input"
      placeholder="ex: Ronaldo9"
      maxlength="50"
      autofocus
      required
      value="{{ nickname or '' }}"
    >
    <input
      type="password"
      name="pin"
      class="nickname-input"
      placeholder="PIN de 4 dígitos"
      maxlength="4"
      inputmode="numeric"
      pattern="\d{4}"
      required
    >
    {% if error %}
    <p class="field-error">{{ error }}</p>
    {% endif %}
    <button type="submit" class="btn-primary">Entrar no Bolão</button>
  </form>
</div>
{% endblock %}
